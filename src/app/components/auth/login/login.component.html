<div class="row justify-content-center">
  <div class="col-xl-5">
    <div class="card auth-card">
      <div class="card-body px-3 py-5">
        <!-- <app-logo-box logoHeight="30" height="24" className="mx-auto mb-4 text-center auth-logo" /> -->
        <h2 class="fw-bold text-center fs-18">Sign In</h2>
        <p class="text-muted text-center mt-1 mb-4">Enter your email address and password to access your panel.</p>

        <div class="px-4">
          <form [formGroup]="loginForm" (ngSubmit)="login()" class="authentication-form">
            <div class="mb-3">
              <label class="form-label" for="example-username">Username</label>
              <input formControlName="username" type="text" id="example-username" name="example-username" class="form-control"
                placeholder="Enter your username">
            </div>
            <div class="mb-3">
              <label class="form-label" for="example-password">Password</label>
              <input type="password" formControlName="password"  id="example-password" class="form-control" placeholder="Enter your password">
            </div>
            

            <div class="mb-1 text-center d-grid">
              <button class="btn btn-primary" type="submit">Sign In</button>
            </div>
          </form>

        </div>
      </div>
    </div>

  </div>
</div>
